{% extends "base.html" %}
{% block title %}500 - Server Error - SecureBank{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-6 text-center">
    <h1 class="display-1 fw-bold text-muted">500</h1>
    <h4 class="mb-3">Something Went Wrong</h4>
    <p class="text-muted">An unexpected error occurred on the server. Please try again later.</p>
    <a href="{{ url_for('login') }}" class="btn btn-primary mt-2">Go to Login</a>
  </div>
</div>
{% endblock %}

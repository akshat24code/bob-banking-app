{% extends "base.html" %}

{% block title %}Login - SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-1 fw-bold text-primary">Welcome Back</h4>
        <p class="text-center text-muted small mb-4">Sign in to your SecureBank account</p>
        <form method="POST" action="{{ url_for('login') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" id="username" name="username"
              placeholder="Enter your username" autocomplete="username" required />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" id="password" name="password"
              placeholder="Enter your password" autocomplete="current-password" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Log In</button>
          </div>
        </form>
      </div>
    </div>
    <div class="mt-3 text-center">
      <small class="text-muted">
        Demo accounts: <strong>alice / password123</strong> &nbsp;|&nbsp;
        <strong>bob / securepass</strong>
      </small>
    </div>
  </div>
</div>
{% endblock %}
